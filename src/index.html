<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bluebel Studio</title>
    <meta name="description" content="o editor de codigo bluebel">
    <meta name="author" content="Belbel1124">
    <link rel="icon" type="icon" href="assets/icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="toolbar">
      <span id="lang-name">Sem linguagem</span>
      <button type="button" id="btn-load-lang">Carregar linguagem (Ctrl+L)</button>
      <button type="button" id="btn-run" class="btn-run">▶ Executar (F5)</button>
    </div>
    <div id="editor-wrap">
      <div id="highlight-layer" aria-hidden="true"></div>
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      <div id="autocomplete-box"></div>
    </div>
    <div id="statusbar">
      <span id="status-pos">Ln 1, Col 1</span>
    </div>
    <div id="output-panel">
      <div id="output-header">
        <span>Terminal</span>
        <div>
          <button type="button" id="btn-clear-output" title="Limpar">🗑</button>
          <button type="button" id="btn-close-output" title="Fechar">✕</button>
        </div>
      </div>
      <pre id="output-content"></pre>
      <div id="terminal-input-wrapper">
        <span class="terminal-prompt">$</span>
        <input type="text" id="terminal-input" placeholder="Digite um comando ou /help" autocomplete="off" />
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
